name: Deploy to VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env and Deploy
        env:
          S_USER: ${{ secrets.SERVER_USER || secrets.USERNAME }}
          S_IP: ${{ secrets.SERVER_IP }}
        run: |
          DEST="$S_IP"
          if [ -n "$S_USER" ]; then DEST="${S_USER}@${S_IP}"; fi
          
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$DEST" 'bash -s' << 'ENDSSH'
            set -euo pipefail
            APP_DIR="/opt/market-collector"
            
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER:$USER" "$APP_DIR"
            
            # Write .env
            cat > "$APP_DIR/.env" << EOF
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            LOG_LEVEL=INFO
            EOF
            sed -i 's/^[[:space:]]*//' "$APP_DIR/.env"

            # Sync Code
            if [ ! -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git init
              git remote add origin https://github.com/Deepjyoti7147/StockDataCollectionAgent.git
            fi
            
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            
            # Build and Restart
            sudo docker compose build --no-cache
            sudo docker compose down || true
            sudo docker compose up -d
          ENDSSH
