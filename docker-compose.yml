version: "3.9"
services:
  market-collector:
    build: .
    image: market-collector:latest
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
